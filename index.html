## Binary counting and coordinate shifting of a curve in space 
Given N "monads" describing  a curve in space $\\vec{\\mathbf{X_n}}$ , created by a single array of complex numbers $Z_n$ created recursively. 

$$\\vec{\\mathbf{X_n}}=(u_n,v_n,w_n)$$

Considering:
$$n \\in \\mathbb{N}_0$$

$$T_o \\in \\mathbb{Q}$$


We have

$$
r_k=
\\begin{cases}
0 & k < 0 \\\\
r_{k-1}+\\Delta r_o & k \\geq 0 \\text{ and } k \\equiv 0 \\pmod{M} \\\\
r_{k-1} & k > 0 \\text{ and } k \\not\\equiv 0 \\pmod{M}
\\end{cases}
$$
$$k \\in \\mathbb{Z}$$


So :

$$\\omega=e^{\\frac{2\\pi i}{T_o}}$$

$$Z_n=r_n\\omega^n$$





## Coloring

The color $C_n$ in these examples is based on  "hsv" or "coolwarm" colormaps with $M_c$ colors:

$$C_n \\equiv n \\pmod{M_{c}}$$





## Coordinates
And cartesian coordinates for the sequences describing a curve in space:
$$\\vec{\\mathbf{X_n}}=(u_n,v_n,w_n)$$


$$\\Omega_o=\\frac{2\\pi }{T_o}$$

And the spatial coordinates arrays for index $n$

$$u_n=\\frac{1}{2}(Z_n+\\overline{Z_n})=r_n \\cos(\\Omega_o n)$$

$$v_n=\\frac{1}{2i}(Z_n-\\overline{Z_n})=r_n \\sin(\\Omega_o n)$$

$$w_n=\\log_{2}(|Z_n|)$$

# Binary counting and coordinate shifting of a curve in space 

Given N "monads" describing  a curve in space $\\vec{\\mathbf{X_n}}$ , created by a single array of complex numbers $Z_n$

$$\\vec{\\mathbf{X_n}}=(u_n,v_n,w_n)$$

Considering:
$$n \\in \\mathbb{N}_0$$

$$T_o \\in \\mathbb{R}$$

We have

$$\\omega=e^{\\frac{2\\pi i}{T_o}}$$


And 

$$Z_n=r_n\\omega^n$$

$$\\overline{Z_n}=r_n\\omega^{-n}$$


The modulus of $Z_n$ can have many growth rules, for the initial set of examples we will use the following recursive rules to keep things simple:

$$|Z_n|=r_n$$

## Coloring

The color $C_n$ in these examples is based on  "hsv" or "coolwarm" colormaps with $M_c$ colors:

$$C_n \\equiv n \\pmod{M_{c}}$$



## Designing the modulus of $Z_n$ recursively

For a given positive integer $M$, as the maximum amount of monads allowed per same-radius-circumference, and a real number $\\Delta r_o$ defining in this case the discrete growth of r_n every time $n \\equiv 0 \\pmod{M}$. 



$$
r_k=
\\begin{cases}
0 & k < 0 \\\\
r_{k-1}+\\Delta r_o & k \\geq 0 \\text{ and } k \\equiv 0 \\pmod{M} \\\\
r_{k-1} & k \\geq 0 \\text{ and } k \\not\\equiv 0 \\pmod{M}
\\end{cases}
$$

Considering:

$$k \\in \\mathbb{Z}$$

$$\\Delta r_o \\in \\mathbb{R}$$




So we can imagine a "discrete-time" main index for the model of creation process in the proposed toy-universe:



$$n=[0,1,2,3,4,...,N-1]$$



We define the main set of arrays describing a curve in space

$$\\vec{\\mathbf{X_n}}=(u_n,v_n,w_n)$$


$$\\Omega_o=\\frac{2\\pi }{T_o}$$

And the spatial coordinates arrays for index $n$

$$u_n=\\frac{1}{2}(Z_n+\\overline{Z_n})=r_n \\cos(\\Omega_o n)$$

$$v_n=\\frac{1}{2i}(Z_n-\\overline{Z_n})=r_n \\sin(\\Omega_o n)$$

$$w_n=\\frac{\\log(|Z_n|)}{\\log(2)}$$


So we have an analogous way to see that:


$$Z_n=u_n+iv_n$$

$$\\overline{Z_n}=u_n-iv_n$$




So from a simple 2D numbers array $Z_n$, we can construct  8 curves in space , given by the $2^{3}$ symmetries in the positive $w$ direction


Consider:

$$R_n=\\frac{v_n}{u_n}$$

$$\\vec{\\mathbf{V_n}}=(k_u u_n,k_v v_n,k_w w_n)$$

* xyz x4 - Four basic symmetries for a complex number

| Binary | Decimal | Curve| LSb Symmetry | $k_u$| $k_v$| $k_w$ |
|--------|---------|-----|--------------|------|------|-------|
| 000    | 0       | A   | $u_n+ iv_n$  | 1 | 1 | 1 |
| 001    | 1       | B   | $u_n- iv_n$  | 1 | -1| 1 | 
| 010    | 2       | C   | $-u_n+ iv_n$ | -1 | 1| 1 |
| 011    | 3       | D   | $-u_n- iv_n$ | -1 |- 1| 1 |




* yxz x4 - Four basic symmetries for a coordinate shift on a complex number

| Binary | Decimal | Curve| LSb Symmetry | $k_u$| $k_v$| $k_w$ |
|--------|---------|-----|--------------|------|------|-------|
| 100    | 4       | E   | $v_n +iu_n$  | $R_n$    |  $\\frac{1}{R_n}$ |  1 |
| 101    | 5       | F   | $v_n -iu_n$  | $R_n$    |  $-\\frac{1}{R_n}$ |  1 |
| 110    | 6       | G   | $-v_n +iu_n$ | $-R_n$    |  $\\frac{1}{R_n}$ |  1 |
| 111    | 7       | H   | $-v_n -iu_n$ | $-R_n$    |  $-\\frac{1}{R_n}$ |  1 | 


We could continue this table for $k_w=-1$, with the mirrored curves totaling  $2^4$ mirrored curves


This change is iust to indicate more clearly that up to 48 curves can be created mirroring the same $\\vec{X}$, being the first 8 paths:



$$\\vec{X_n}=(k_u u_n,k_v v_n,k_w w_n)$$

        class Complex {
            constructor(real, imag) {
                this.real = real;
                this.imag = imag;
            }
            
            static fromPolar(r, theta) {
                return new Complex(r * Math.cos(theta), r * Math.sin(theta));
            }
            
            add(other) {
                return new Complex(this.real + other.real, this.imag + other.imag);
            }
            
            multiply(other) {
                if (typeof other === 'number') {
                    return new Complex(this.real * other, this.imag * other);
                }
                return new Complex(
                    this.real * other.real - this.imag * other.imag,
                    this.real * other.imag + this.imag * other.real
                );
            }
            
            exp() {
                const expReal = Math.exp(this.real);
                return new Complex(expReal * Math.cos(this.imag), expReal * Math.sin(this.imag));
            }
            
            magnitude() {
                return Math.sqrt(this.real * this.real + this.imag * this.imag);
            }
        }

        const np = {
            sin: Math.sin,
            cos: Math.cos,
            exp: (x) => {
                if (x instanceof Complex) return x.exp();
                if (typeof x === 'number') return Math.exp(x);
                return Math.exp(x);
            },
            sqrt: Math.sqrt,
            log: Math.log,
            abs: (x) => {
                if (x instanceof Complex) return x.magnitude();
                return Math.abs(x);
            },
            pi: Math.PI,
            e: Math.E
        };

        function evaluateCustomFunction(funcStr, n) {
            try {
                // Replace 1j with Complex object notation
                let processedStr = funcStr.replace(/(\d*\.?\d+)j/g, (match, num) => {
                    const coefficient = num ? parseFloat(num) : 1;
                    return `new Complex(0, ${coefficient})`;
                });
                
                // Create a safe evaluation context
                const func = new Function('n', 'np', 'Math', 'Complex', `return ${processedStr}`);
                return func(n, np, Math, Complex);
            } catch (e) {
                console.error('Error evaluating function:', e);
                return NaN;
            }
        }

        function computeCustomCoordinatesJS(num_points, znFunc, rFunc, thetaFunc) {
            const n_arr = Array.from({length:num_points},(_,i)=>i);
            const u_b = new Array(num_points);
            const v_b = new Array(num_points);
            const w_b = new Array(num_points);
            
            if (num_points === 0) return {n_array:n_arr, u_base:[], v_base:[], w_base:[]};
            
            for (let i = 0; i < num_points; i++) {
                const n = n_arr[i];
                let z_re, z_im, r_mag;
                
                if (znFunc && znFunc.trim()) {
                    // Direct Z_n function (can return complex)
                    const result = evaluateCustomFunction(znFunc, n);
                    if (result instanceof Complex) {
                        // Complex number object
                        z_re = result.real;
                        z_im = result.imag;
                    } else if (typeof result === 'object' && result !== null && 'real' in result) {
                        // Legacy complex object format
                        z_re = result.real;
                        z_im = result.imag;
                    } else if (typeof result === 'number') {
                        z_re = result;
                        z_im = 0;
                    } else {
                        z_re = 0;
                        z_im = 0;
                    }
                    r_mag = Math.sqrt(z_re * z_re + z_im * z_im);
                } else if (rFunc && thetaFunc) {
                    // Polar form: r(n), theta(n)
                    let r = evaluateCustomFunction(rFunc, n);
                    let theta = evaluateCustomFunction(thetaFunc, n);
                    // Ensure numeric values
                    if (r instanceof Complex) r = r.real;
                    if (theta instanceof Complex) theta = theta.real;
                    z_re = r * Math.cos(theta);
                    z_im = r * Math.sin(theta);
                    r_mag = Math.abs(r);
                } else {
                    z_re = 0;
                    z_im = 0;
                    r_mag = 0;
                }
                
                u_b[i] = z_re;
                v_b[i] = z_im;
                w_b[i] = (r_mag > 0) ? Math.log2(r_mag) : (r_mag === 0 ? -Infinity : NaN);
            }
            
            return {n_array: n_arr, u_base: u_b, v_base: v_b, w_base: w_b};
        }

        function isPrime(num) { if (num < 2) return false; for (let i = 2; i * i <= num; i++) if (num % i === 0) return false; return true; }
        function generatePointColorStrings(n_array, M_c, useSpecial, a, b) { 
            if (useSpecial) {
                const c = []; 
                const mod = (M_c <= 0) ? 1 : M_c;
                const paramA = (a !== undefined) ? a : 8;
                const paramB = (b !== undefined) ? b : 3;
                for (let i=0; i < n_array.length; i++) {
                    const val = (paramA * n_array[i] + paramB) % mod;
                    // Ensure positive modulo result
                    const positiveVal = (val < 0) ? (val + mod) : val;
                    c.push(`hsl(${Math.floor(positiveVal * (360/mod))},100%,50%)`); 
                }
                return c;
            }
            if (M_c <= 0) M_c = 1; 
            const c = []; 
            for (let i=0; i < n_array.length; i++) c.push(`hsl(${Math.floor((n_array[i]%M_c)*(360/M_c))},100%,50%)`); 
            return c; 
        }

        // Build a full save payload (base data + derived curves) for rehydrating animations offline.
        function buildSavePayload(camera) {
            const base = fullCoordDataCache ? {
                n_array: [...fullCoordDataCache.n_array],
                u_base: [...fullCoordDataCache.u_base],
                v_base: [...fullCoordDataCache.v_base],
                w_base: [...fullCoordDataCache.w_base]
            } : null;

            const derivedCurves = {};
            if (base) {
                const len = base.n_array.length;
                transforms.forEach(t => {
                    const xs = new Array(len), ys = new Array(len), zs = new Array(len);
                    for (let i = 0; i < len; i++) {
                        const [x, y, z] = t.func(base.u_base[i], base.v_base[i], base.w_base[i], base.n_array[i], i);
                        xs[i] = x; ys[i] = y; zs[i] = z;
                    }
                    derivedCurves[t.name] = { group: t.group, x: xs, y: ys, z: zs };
                });
            }

            const pointColors = base ? generatePointColorStrings(base.n_array, currentParams.M_c_color, currentParams.use_special_coloring, currentParams.color_a, currentParams.color_b) : [];

            return {
                version: 'v6',
                timestamp: new Date().toISOString(),
                parameters: { ...currentParams },
                camera: camera || null,
                preset: presetDropdown ? presetDropdown.value : null,
                data: {
                    base,
                    derived_curves: derivedCurves,
                    point_colors: pointColors,
                    active_curves: [...currentParams.active_curves],
                }
            };
        }
        function computeUserCoordinatesJS(num_points, M_r_update, delta_r_initial, T_o_period, use_custom = false, custom_zn = '', custom_r = '', custom_theta = '') { 
            // If custom function enabled, use it instead
            if (use_custom && (custom_zn || (custom_r && custom_theta))) {
                return computeCustomCoordinatesJS(num_points, custom_zn, custom_r, custom_theta);
            }
            
            // Standard computation
            const n_arr = Array.from({length:num_points},(_,i)=>i); 
            const r_arr = new Array(num_points).fill(0); 
            if(num_points===0) return {n_array:n_arr,u_base:[],v_base:[],w_base:[]}; 
            if(M_r_update<=0)M_r_update=1; 
            let current_r=0; 
            if(num_points>0){
                if(0%M_r_update===0)current_r+=delta_r_initial; 
                r_arr[0]=current_r; 
                for(let k=1;k<num_points;k++){
                    if(k%M_r_update===0)current_r+=delta_r_initial; 
                    r_arr[k]=current_r;
                }
            } 
            const Omega_o=(T_o_period===0)?0:(2*Math.PI/T_o_period); 
            const u_b=new Array(num_points),v_b=new Array(num_points),w_b=new Array(num_points); 
            for(let i=0;i<num_points;i++){
                const ang=Omega_o*n_arr[i],r_v=r_arr[i]; 
                u_b[i]=r_v*Math.cos(ang);
                v_b[i]=r_v*Math.sin(ang);
                w_b[i]=(r_v>0)?Math.log2(r_v): (r_v === 0 ? -Infinity : NaN);
            } 
            return {n_array:n_arr, u_base:u_b, v_base:v_b, w_base:w_b};
        }
        function computeCompassCoordinatesJS(N, filterType) {
            const n_arr = Array.from({length: N}, (_, i) => i);
            const u_b = new Array(N), v_b = new Array(N), w_b = new Array(N);
            
            // Constants from notebook
            const T_y = 7, T_m = 12, T_d = 31, T_h = 24;
            let r_y = 1, r_m = 1, r_d = 1, r_h = 1;
            
            if (filterType === 'filter1') {
                r_y = 24; r_m = 12; r_d = 3; r_h = 1;
            } else if (filterType === 'filter2') {
                r_y = 1/Math.pow(2, 2);
                r_m = 1/Math.pow(2, 4);
                r_d = 1/Math.pow(2, 2*Math.PI);
                r_h = 1/Math.pow(2, 10);
            }

            const startDate = new Date('2023-01-01T00:00:00');

            for (let i = 0; i < N; i++) {
                const n = n_arr[i];
                // Calculate date components (n is hours since start)
                const currentDate = new Date(startDate.getTime() + n * 3600 * 1000);
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth() + 1; // 1-12
                const day = currentDate.getDate();
                const hour = currentDate.getHours();

                // Calculate compass components
                const theta_y = (2 * Math.PI / T_y) * year;
                const theta_m = (2 * Math.PI / T_m) * month;
                const theta_d = (2 * Math.PI / T_d) * day;
                const theta_h = (2 * Math.PI / T_h) * hour;

                const y_re = r_y * Math.cos(theta_y), y_im = r_y * Math.sin(theta_y);
                const m_re = r_m * Math.cos(theta_m), m_im = r_m * Math.sin(theta_m);
                const d_re = r_d * Math.cos(theta_d), d_im = r_d * Math.sin(theta_d);
                const h_re = r_h * Math.cos(theta_h), h_im = r_h * Math.sin(theta_h);

                // Atlas = sum
                const atlas_re = y_re + m_re + d_re + h_re;
                const atlas_im = y_im + m_im + d_im + h_im;

                u_b[i] = atlas_re;
                v_b[i] = atlas_im;
                
                const r = Math.sqrt(atlas_re*atlas_re + atlas_im*atlas_im);
                w_b[i] = (r > 0) ? Math.log(r) : -10; 
            }
            
            return { n_array: n_arr, u_base: u_b, v_base: v_b, w_base: w_b };
        }

        function computeInspirationalCoordinatesJS(N,D){ const D_c=(D===0)?1e-9:parseFloat(D),r_o_c=1/D_c,sD1=(D_c-1<0)?Math.sqrt(Math.abs(D_c-1)):Math.sqrt(D_c-1),r_e_re=0.5,r_e_im=sD1/2,t_o_c=D_c+3+3+3,sD2=(D_c+1<0)?Math.sqrt(Math.abs(D_c+1)):Math.sqrt(D_c+1),T_o_i=4*Math.PI*(1+sD2),O_i=(T_o_i===0)?0:(2*Math.PI/T_o_i); const n_arr=Array.from({length:N},(_,i)=>i),u_b=new Array(N),v_b=new Array(N),w_b=new Array(N); for(let i=0;i<N;i++){const n1=n_arr[i]+1,e_a=-O_i*n1,e_re=Math.cos(e_a),e_im=Math.sin(e_a),tau_re=r_o_c*(r_e_re*e_re-r_e_im*e_im),tau_im=r_o_c*(r_e_re*e_im+r_e_im*e_re),tca=r_o_c+t_o_c-(n1/(2*(r_o_c||1e-9))),alpha=tca*tau_re,tcb=r_o_c+t_o_c-((sD1*n1)/2),beta=tcb*tau_im; u_b[i]=alpha;v_b[i]=beta;const msq=alpha*alpha+beta*beta;w_b[i]=(msq>0)?(0.5*Math.log2(msq)):(msq===0?-Infinity:NaN);} return {n_array:n_arr,u_base:u_b,v_base:v_b,w_base:w_b};}
        function createCurveCheckboxes(initialActiveCurves = []) { 
            curveSelectionPanel.innerHTML = '<h5>Active Curves</h5>'; 
            const groups = {}; 
            const specialNameToLabel = {
                "alpha": "α", "beta": "β", "gamma_t": "γ", "delta": "δ",

                fcD.appendChild(lbl); 
                groups[t.group].appendChild(fcD); 
                curveCheckboxes[t.name]=cb; 
                cb.addEventListener('change',()=>{setPresetToCustom(); currentParams.active_curves=transforms.filter(tc=>curveCheckboxes[tc.name]&&curveCheckboxes[tc.name].checked).map(tc=>tc.name); updatePlot();});

        }

        function gatherCurrentParams() {

            const compassFilterSelect = document.getElementById('compass-filter-select');

        function updatePlot() {
            if (animationFrameId !== null) { cancelAnimationFrame(animationFrameId); animationFrameId = null; }
            currentAnimationFramePointIndex = 0; lastFrameTime = 0;
            gatherCurrentParams();
            animationFpsControls.style.display = currentParams.animate_points ? 'flex' : 'none';

            if (currentParams.formula_set === "User's Formulas") {
                fullCoordDataCache = computeUserCoordinatesJS(
                    currentParams.num_points, 
                    currentParams.M_r_update, 
                    currentParams.delta_r_initial, 
                    currentParams.T_o_period,
                    currentParams.use_custom_function,
                    currentParams.custom_zn_function,
                    currentParams.custom_r_function,
                    currentParams.custom_theta_function
                );
            } else if (currentParams.formula_set === "Compass Numbers") {
                fullCoordDataCache = computeCompassCoordinatesJS(currentParams.num_points, currentParams.compass_filter);
            } else {
                fullCoordDataCache = computeInspirationalCoordinatesJS(currentParams.num_points, currentParams.D_dimension);
            }

            if (currentParams.reverse_order && fullCoordDataCache) {
                const reverseArray = (arr) => Array.isArray(arr) ? [...arr].reverse() : [];
                fullCoordDataCache = {
                    n_array: reverseArray(fullCoordDataCache.n_array),
                    u_base: reverseArray(fullCoordDataCache.u_base),
                    v_base: reverseArray(fullCoordDataCache.v_base),
                    w_base: reverseArray(fullCoordDataCache.w_base)
                };
            }

            if (currentParams.animate_points) {
                if (fullCoordDataCache.n_array.length > 0) { animateNextFrame(performance.now()); } 
                else { drawPlotData([], [], [], []); }
            } else {
                drawPlotData(fullCoordDataCache.n_array, fullCoordDataCache.u_base, fullCoordDataCache.v_base, fullCoordDataCache.w_base);
            }
        }

        function animateNextFrame(currentTime) {
            if (!currentParams.animate_points || !fullCoordDataCache || fullCoordDataCache.n_array.length === 0) {
                if (animationFrameId !== null) cancelAnimationFrame(animationFrameId); animationFrameId = null; return;
            }
            animationFrameId = requestAnimationFrame(animateNextFrame);

            const elapsed = currentTime - (lastFrameTime || currentTime);
            const frameDelay = 1000 / Math.max(1, currentParams.animation_fps);

            if (elapsed >= frameDelay || lastFrameTime === 0) {
                lastFrameTime = currentTime - (elapsed % frameDelay);
                let pointsToRender = currentAnimationFramePointIndex;
                if (pointsToRender === 0 && fullCoordDataCache.n_array.length > 0) pointsToRender = 1; 
                pointsToRender = Math.min(pointsToRender, fullCoordDataCache.n_array.length);

                drawPlotData(
                    fullCoordDataCache.n_array.slice(0, pointsToRender), 
                    fullCoordDataCache.u_base.slice(0, pointsToRender), 
                    fullCoordDataCache.v_base.slice(0, pointsToRender), 
                    fullCoordDataCache.w_base.slice(0, pointsToRender)
                );

                if (currentAnimationFramePointIndex < fullCoordDataCache.n_array.length) currentAnimationFramePointIndex++;
                else { 
                    cancelAnimationFrame(animationFrameId); animationFrameId = null; 
                    drawPlotData(fullCoordDataCache.n_array, fullCoordDataCache.u_base, fullCoordDataCache.v_base, fullCoordDataCache.w_base);
                }
            }
        }
        
        function drawPlotData(n_array_subset, u_base_subset, v_base_subset, w_base_subset) {
            const plotDivEl = document.getElementById('plotDiv');
            if (!plotDivEl) return;

            let isEmptyCall = (!n_array_subset || n_array_subset.length === 0);
            if (currentParams.num_points === 0) { Plotly.react('plotDiv', [], { title: 'Set N Points > 0' }); return; }
            if (isEmptyCall && (!currentParams.animate_points || (currentParams.animate_points && currentAnimationFramePointIndex > 1) || (currentParams.animate_points && fullCoordDataCache && fullCoordDataCache.n_array.length === 0) )) {
                 Plotly.react('plotDiv', [], { title: 'No points to display.' }); return;
            }
            
            const point_colors_subset = generatePointColorStrings(n_array_subset, currentParams.M_c_color);
            const active_transforms = transforms.filter(t => curveCheckboxes[t.name] && curveCheckboxes[t.name].checked);
            const fig_data = []; 
            
            const primes_indices_in_subset = (currentParams.highlight_primes || currentParams.show_prime_point_indices) ? 
                n_array_subset.map((n_val, i_subset) => isPrime(n_val + 1) ? i_subset : -1).filter(i => i !== -1) : [];

            for (const t of active_transforms) {
                const x=[],y=[],z=[]; 
                for(let i=0; i < n_array_subset.length; i++){ const[xt,yt,zt]=t.func(u_base_subset[i],v_base_subset[i],w_base_subset[i], n_array_subset[i], i); x.push(xt);y.push(yt);z.push(zt); }
                
                const sz=new Array(n_array_subset.length).fill(currentParams.scatter_size); 
                const sy=new Array(n_array_subset.length).fill('circle'); 
                const mc = [...point_colors_subset]; 
                const mo = new Array(n_array_subset.length).fill(0.9);

                if(currentParams.highlight_primes) {
                    const primeMarker = currentParams.prime_marker || 'diamond';
                    primes_indices_in_subset.forEach(idx_in_subset =>{ 
                        if(idx_in_subset < n_array_subset.length){ 
                            sz[idx_in_subset]=currentParams.scatter_size*currentParams.prime_size_factor; 
                            sy[idx_in_subset]=primeMarker; 
                        }
                    }); 
                }
                
                let trace_mode = currentParams.line_between_dots ? 'lines+markers' : 'markers';
                let trace_text_values = new Array(n_array_subset.length).fill("");
                let trace_text_font_colors = new Array(n_array_subset.length).fill('rgba(0,0,0,0)');
                let trace_text_font_config;
                let apply_text_styling = false;

                if (currentParams.show_prime_point_indices && n_array_subset.length > 0) {
                    trace_mode += '+text';
                    apply_text_styling = true;
                    primes_indices_in_subset.forEach(idx_in_subset => {
                        if (idx_in_subset < n_array_subset.length) {
                            const n_val = n_array_subset[idx_in_subset];
                            const display_val = currentParams.show_index_mod_mc 
                                ? String((n_val + 1) % currentParams.M_c_color)
                                : String(n_val + 1);
                            trace_text_values[idx_in_subset] = display_val;      
                            trace_text_font_colors[idx_in_subset] = point_colors_subset[idx_in_subset]; 
                            
                            // Remove marker for primes, leave only text
                            sz[idx_in_subset] = 0;      
                            mo[idx_in_subset] = 0;      
                        }
                    });
                } else if (currentParams.show_all_point_indices && n_array_subset.length > 0) {
                    trace_mode += '+text';
                    apply_text_styling = true;
                    trace_text_values = n_array_subset.map(n => {
                        const display_val = currentParams.show_index_mod_mc 
                            ? String((n + 1) % currentParams.M_c_color)
                            : String(n + 1);
                        return display_val;
                    }); 
                    trace_text_font_colors.fill('#FFFFFF'); 
                }

                if(apply_text_styling){
                    trace_text_font_config = { color: trace_text_font_colors, size: 16 }; // Size 16
                }
                
                fig_data.push({ 
                    x,y,z, mode:trace_mode, type:'scatter3d', 
                    marker:{size:sz,color:mc,symbol:sy,opacity:mo,line:{width:0.2,color:'rgba(200,200,200,0.3)'}}, 
                    line:currentParams.line_between_dots?{width:currentParams.line_width,color:'rgba(150,150,150,0.4)'}:undefined, 
                    text: trace_text_values, 
                    textfont: trace_text_font_config, 
                    textposition: apply_text_styling ? 'middle center' : undefined, // Position middle center
                    name:t.name, hoverinfo:'skip' 
                });
            }
            
            // Add lines between primes if enabled
            if (currentParams.prime_lines && primes_indices_in_subset.length > 1) {
                // Group prime indices by transform to draw lines within each curve
                
                transforms.filter(t => currentParams.active_curves.includes(t.name)).forEach(t => {
                    const primeCoords = [];
                    primes_indices_in_subset.forEach(idx_in_subset => {
                        if (idx_in_subset < u_base_subset.length) {
                            const [xt, yt, zt] = t.func(
                                u_base_subset[idx_in_subset],
                                v_base_subset[idx_in_subset],
                                w_base_subset[idx_in_subset],
                                n_array_subset[idx_in_subset],
                                idx_in_subset
                            );
                            primeCoords.push({ x: xt, y: yt, z: zt, idx: idx_in_subset });
                        }
                    });
                    
                    if (primeCoords.length > 1) {
                        // Sort by index to connect in order
                        primeCoords.sort((a, b) => a.idx - b.idx);
                        
                        // Check explicit "Color By Source" flag OR if generic color by source is enabled. 
                        // Note: Using a simpler check here to avoid red line issue
                        if (currentParams.prime_lines_color_by_source) {
                            // SPLIT TRACE METHOD for solid segments
                            // We group segments by their source color.
                            const segmentsByColor = {}; // { colorString: { x:[], y:[], z:[] } }

                            for (let i = 0; i < primeCoords.length - 1; i++) {
                                const sourceIdx = primeCoords[i].idx;
                                const sourceColor = point_colors_subset[sourceIdx];
                                
                                if (!segmentsByColor[sourceColor]) {
                                    segmentsByColor[sourceColor] = { x: [], y: [], z: [] };
                                }
                                
                                segmentsByColor[sourceColor].x.push(primeCoords[i].x, primeCoords[i+1].x, null);
                                segmentsByColor[sourceColor].y.push(primeCoords[i].y, primeCoords[i+1].y, null);
                                segmentsByColor[sourceColor].z.push(primeCoords[i].z, primeCoords[i+1].z, null);
                            }

                            for (const [colorStr, coords] of Object.entries(segmentsByColor)) {
                                fig_data.push({
                                    x: coords.x, y: coords.y, z: coords.z,
                                    mode: 'lines', type: 'scatter3d',
                                    line: { width: currentParams.prime_line_width, color: colorStr },
                                    name: `${t.name} Links`, hoverinfo: 'skip', showlegend: false
                                });
                            }

                        } else if (currentParams.prime_lines_color_by_distance) {
                            // ... existing distance logic ...
                            const xLine = primeCoords.map(p => p.x);
                            const yLine = primeCoords.map(p => p.y);
                            const zLine = primeCoords.map(p => p.z);
                            
                            // Calculate distances between consecutive primes
                            const distances = [];
                            for (let i = 1; i < primeCoords.length; i++) {
                                const dx = primeCoords[i].x - primeCoords[i-1].x;
                                const dy = primeCoords[i].y - primeCoords[i-1].y;
                                const dz = primeCoords[i].z - primeCoords[i-1].z;
                                const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                                distances.push(dist);
                            }
                            
                            // Normalize distances for color mapping (use first distance as reference)
                            const minDist = Math.min(...distances);
                            const maxDist = Math.max(...distances);
                            const distRange = maxDist - minDist;
                            
                            // Create color array for each segment
                            const segmentColors = distances.map(dist => {
                                if (distRange === 0) return 'rgba(255, 0, 0, 0.8)';
                                const normalized = (dist - minDist) / distRange;
                                // Color from blue (short distance) to red (long distance)
                                const r = Math.round(255 * normalized);
                                const b = Math.round(255 * (1 - normalized));
                                return `rgba(${r}, 0, ${b}, 0.8)`;
                            });
                            
                            // For Plotly, we need to duplicate the last color for the vertex colors
                            segmentColors.push(segmentColors[segmentColors.length - 1]);
                            
                            fig_data.push({
                                x: xLine, y: yLine, z: zLine,
                                mode: 'lines', type: 'scatter3d',
                                line: { width: currentParams.prime_line_width, color: segmentColors },
                                name: `${t.name} Prime Links`, hoverinfo: 'skip', showlegend: false
                            });
                        } else {
                            // Solid red color
                            const xLine = primeCoords.map(p => p.x);
                            const yLine = primeCoords.map(p => p.y);
                            const zLine = primeCoords.map(p => p.z);
                            
                            fig_data.push({
                                x: xLine, y: yLine, z: zLine,

                                name: `${t.name} Prime Links`, hoverinfo: 'skip', showlegend: false
                            });
                        }
                    }
                });
            }

                // Check for valid number

                    val = isFloat ? 0.1 : min; 
                    numEl.value = val;
                } 
                
                if (!isFloat) {
                    // Integer fields: enforce min/max and round
                    if (val < min) { val = min; } 
                    if (val > max) { val = max; }
                    val = Math.round(val);
                    sliderEl.value = val;
                    numEl.value = val;
                } else {
                    // Float fields: allow any value, only constrain slider
                    let sliderVal = val;
                    if (sliderVal < min) sliderVal = min;
                    if (sliderVal > max) sliderVal = max;
                    sliderEl.value = sliderVal;
                    // Keep user's input value without constraints
                    numEl.value = val;
                }
                commonUpdateActions();
            };

        // ================================================================================
        // COMPASS NUMBERS EXTENSION - Z_n Curves from Jupyter Notebook
        // This section adds the ability to visualize compass number atlas plots
        // where w_n = log(|z_n|) with z_n = x_n + i*y_n (complex log representation)
        // ================================================================================

        // Z_n Transform definitions - these are optional additions that appear in a separate group
        // Each transform includes detailed formula explanation for the info panel
        // 
        // From the Jupyter notebook compass_numbers.ipynb:
        // Given Z_n = u_n + i·v_n (complex number), we compute:
        //   r_n = |Z_n| = sqrt(u_n² + v_n²)
        //   θ_n = arg(Z_n) = atan2(v_n, u_n)
        //   log(Z_n) = log(r_n) + i·θ_n
        //   i·log(Z_n) = -θ_n + i·log(r_n)
        //
        // The notebook uses these representations:
        // - atlas.real, atlas.imag → (u_n, v_n)
        // - np.abs(atlas), np.angle(atlas) → (r_n, θ_n)  
        // - 1j*np.log(atlas) → (-θ_n, log(r_n)) as (real, imag)
        // - np.log(atlas) → (log(r_n), θ_n) as (real, imag)
        
        function getCompassComponents(n, filterType) {
            const T_y = 7, T_m = 12, T_d = 31, T_h = 24;
            let r_y = 1, r_m = 1, r_d = 1, r_h = 1;
            
            if (filterType === 'filter1') {
                r_y = 24; r_m = 12; r_d = 3; r_h = 1;
            } else if (filterType === 'filter2') {
                r_y = 1/Math.pow(2, 2);
                r_m = 1/Math.pow(2, 4);
                r_d = 1/Math.pow(2, 2*Math.PI);
                r_h = 1/Math.pow(2, 10);
            }

            const startDate = new Date('2023-01-01T00:00:00');
            const currentDate = new Date(startDate.getTime() + n * 3600 * 1000);
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const day = currentDate.getDate();
            const hour = currentDate.getHours();

            const theta_y = (2 * Math.PI / T_y) * year;
            const theta_m = (2 * Math.PI / T_m) * month;
            const theta_d = (2 * Math.PI / T_d) * day;
            const theta_h = (2 * Math.PI / T_h) * hour;

            return {
                y: { re: r_y * Math.cos(theta_y), im: r_y * Math.sin(theta_y) },
                m: { re: r_m * Math.cos(theta_m), im: r_m * Math.sin(theta_m) },
                d: { re: r_d * Math.cos(theta_d), im: r_d * Math.sin(theta_d) },
                h: { re: r_h * Math.cos(theta_h), im: r_h * Math.sin(theta_h) }

## Z_n Compass Numbers (from Jupyter Notebook)

These curves replicate the atlas visualizations from \`compass_numbers.ipynb\`, using the same coloring scheme (HSV based on $n \\mod M_c$).

### Compass Components
The "Compass Numbers" formula set constructs the Atlas from four components:
- **Year ($Z_y$):** Period $T_y=7$
- **Month ($Z_m$):** Period $T_m=12$
- **Day ($Z_d$):** Period $T_d=31$
- **Hour ($Z_h$):** Period $T_h=24$

$$Z_{total} = Z_y + Z_m + Z_d + Z_h$$

### Filters
- **Unfiltered:** All radii $r=1$.
- **Filter 1:** Weighted radii ($r_y=24, r_m=12, r_d=3, r_h=1$).
- **Filter 2:** Powers of 2 ($r_y=2^{-2}, r_m=2^{-4}, r_d=2^{-2\\pi}, r_h=2^{-10}$).

### Base Complex Number

Given the curve's base coordinates $(u_n, v_n)$, we form:
$$Z_n = u_n + i \\cdot v_n$$

### Derived Quantities

From $Z_n$ we compute:
- **Modulus:** $r_n = |Z_n| = \\sqrt{u_n^2 + v_n^2}$
- **Argument:** $\\theta_n = \\arg(Z_n) = \\arctan2(v_n, u_n)$
- **Complex logarithm:** $\\log(Z_n) = \\log(r_n) + i\\theta_n$
- **Rotated log:** $i \\cdot \\log(Z_n) = -\\theta_n + i\\log(r_n)$

### Python Code Reference

From the notebook:

## Z_n Transform Formulas

### Group: Zn_components (Individual Compass Numbers)
These display the individual components $Z_y, Z_m, Z_d, Z_h$ with $w_n = \\log(r_n)$.

| Curve | Output $(x, y, z)$ | Description |
|-------|-------------------|-------------|
| **Z_Year** | $(Re(Z_y), Im(Z_y), \\log |Z_y|)$ | Year component |
| **Z_Month** | $(Re(Z_m), Im(Z_m), \\log |Z_m|)$ | Month component |
| **Z_Day** | $(Re(Z_d), Im(Z_d), \\log |Z_d|)$ | Day component |
| **Z_Hour** | $(Re(Z_h), Im(Z_h), \\log |Z_h|)$ | Hour component |

### Group: Zn_atlas (u,v,log(r))
These use the original $(u_n, v_n)$ with $w_n = \\log(r_n)$:

| Curve | Output $(x, y, z)$ | Python Equivalent |
|-------|-------------------|-------------------|
| **Z_A** | $(u_n, v_n, \\log r_n)$ | \`atlas.real, atlas.imag, np.log(np.abs(atlas))\` |
| **Z_B** | $(u_n, -v_n, \\log r_n)$ | \`atlas.real, -atlas.imag, ...\` |
| **Z_C** | $(-u_n, v_n, \\log r_n)$ | \`-atlas.real, atlas.imag, ...\` |
| **Z_D** | $(-u_n, -v_n, \\log r_n)$ | \`-atlas.real, -atlas.imag, ...\` |
| **Z_E** | $(v_n, u_n, \\log r_n)$ | \`atlas.imag, atlas.real, ...\` |
| **Z_F** | $(v_n, -u_n, \\log r_n)$ | \`atlas.imag, -atlas.real, ...\` |
| **Z_G** | $(-v_n, u_n, \\log r_n)$ | \`-atlas.imag, atlas.real, ...\` |
| **Z_H** | $(-v_n, -u_n, \\log r_n)$ | \`-atlas.imag, -atlas.real, ...\` |

### Group: Zn_log_plane (log(r), θ)
Using $\\log(Z_n) = \\log(r_n) + i\\theta_n$:

| Curve | Output $(x, y, z)$ | Description |
|-------|-------------------|-------------|
| **Z_log_real** | $(\\log r_n, \\theta_n, w_n)$ | Log-polar: real part first |
| **Z_log_imag** | $(\\theta_n, \\log r_n, w_n)$ | Log-polar: imag part first |

### Group: Zn_ilog (i·log(Z))
Using $i \\cdot \\log(Z_n) = -\\theta_n + i\\log(r_n)$:

| Curve | Output $(x, y, z)$ | Python Reference |
|-------|-------------------|------------------|
| **Z_ilog_A** | $(-\\theta_n, \\log r_n, w_n)$ | \`(1j*np.log(atlas)).real, .imag\` |
| **Z_ilog_B** | $(\\theta_n, -\\log r_n, w_n)$ | Negated version |

### Group: Zn_bad_atlas (r, θ)
The "bad atlas" from notebook: $B_n = r_n + i\\theta_n$

| Curve | Output $(x, y, z)$ | Python Reference |
|-------|-------------------|------------------|
| **Z_bad_A** | $(r_n, \\theta_n, w_n)$ | \`np.abs(atlas), np.angle(atlas)\` |
| **Z_bad_B** | $(\\theta_n, r_n, w_n)$ | Swapped version |

                    const primeMarker = currentParams.prime_marker || 'diamond';
                    primes_indices_in_subset.forEach(idx_in_subset =>{ 
                        if(idx_in_subset < n_array_subset.length){ 
                            sz[idx_in_subset]=currentParams.scatter_size*currentParams.prime_size_factor; 
                            sy[idx_in_subset]=primeMarker; 
                        }
                    }); 
                }
                
                let trace_mode = currentParams.line_between_dots ? 'lines+markers' : 'markers';
                let trace_text_values = new Array(n_array_subset.length).fill("");
                let trace_text_font_colors = new Array(n_array_subset.length).fill('rgba(0,0,0,0)');
                let trace_text_font_config;
                let apply_text_styling = false;

                if (currentParams.show_prime_point_indices && n_array_subset.length > 0) {
                    trace_mode += '+text';
                    apply_text_styling = true;
                    primes_indices_in_subset.forEach(idx_in_subset => {
                        if (idx_in_subset < n_array_subset.length) {
                            const n_val = n_array_subset[idx_in_subset];
                            const display_val = currentParams.show_index_mod_mc 
                                ? String((n_val + 1) % currentParams.M_c_color)
                                : String(n_val + 1);
                            trace_text_values[idx_in_subset] = display_val;      
                            trace_text_font_colors[idx_in_subset] = point_colors_subset[idx_in_subset]; 
                            sz[idx_in_subset] = 0;      
                            mo[idx_in_subset] = 0;      
                        }
                    });
                } else if (currentParams.show_all_point_indices && n_array_subset.length > 0) {
                    trace_mode += '+text';
                    apply_text_styling = true;
                    trace_text_values = n_array_subset.map(n => {
                        const display_val = currentParams.show_index_mod_mc 
                            ? String((n + 1) % currentParams.M_c_color)
                            : String(n + 1);
                        return display_val;
                    }); 
                    trace_text_font_colors.fill('#FFFFFF'); 
                }

                if(apply_text_styling){
                    trace_text_font_config = { color: trace_text_font_colors, size: 16 };
                }
                
                fig_data.push({ 
                    x,y,z, mode:trace_mode, type:'scatter3d', 
                    marker:{size:sz,color:mc,symbol:sy,opacity:mo,line:{width:0.2,color:'rgba(200,200,200,0.3)'}}, 
                    line:currentParams.line_between_dots?{width:currentParams.line_width,color:'rgba(150,150,150,0.4)'}:undefined, 
                    text: trace_text_values, 
                    textfont: trace_text_font_config, 
                    textposition: apply_text_styling ? 'middle center' : undefined,
                    name:t.name, hoverinfo:'skip' 
                });
            }

            // Process Z_n transforms (using SAME HSV color scheme as main curves to match notebook)
            // This replicates the notebook's color_atlas() with cmap='hsv' and T_color=M_c
            for (const t of active_zn_transforms) {
                const x=[],y=[],z=[]; 
                for(let i=0; i < n_array_subset.length; i++){ 
                    const[xt,yt,zt]=t.func(u_base_subset[i],v_base_subset[i],w_base_subset[i], n_array_subset[i], i); 
                    x.push(xt);y.push(yt);z.push(zt); 
                }
                
                const sz=new Array(n_array_subset.length).fill(currentParams.scatter_size); 
                const sy=new Array(n_array_subset.length).fill('circle'); 
                // Use the SAME HSV colormap as main curves: hsl(n % M_c * 360/M_c, 100%, 50%)
                // This matches the notebook's: get_color = cm.get_cmap('hsv', T_color); color=get_color(symbol_color % T_color)
                const mc = [...point_colors_subset]; // Same colors as main curves!
                const mo = new Array(n_array_subset.length).fill(0.9);

                if(currentParams.highlight_primes) {
                    const primeMarker = currentParams.prime_marker || 'diamond';
                    primes_indices_in_subset.forEach(idx_in_subset =>{ 
                        if(idx_in_subset < n_array_subset.length){ 
                            sz[idx_in_subset]=currentParams.scatter_size*currentParams.prime_size_factor; 
                            sy[idx_in_subset]=primeMarker; 
                        }
                    }); 
                }
                
                let trace_mode = currentParams.line_between_dots ? 'lines+markers' : 'markers';
                
                fig_data.push({ 
                    x,y,z, mode:trace_mode, type:'scatter3d', 
                    marker:{size:sz,color:mc,symbol:sy,opacity:mo,line:{width:0.2,color:'rgba(200,200,200,0.3)'}}, 
                    line:currentParams.line_between_dots?{width:currentParams.line_width,color:'rgba(150,150,150,0.4)'}:undefined, 
                    name:t.name, hoverinfo:'skip' 
                });
            }
            
            // Add lines between primes if enabled (for main curves)
            if (currentParams.prime_lines && primes_indices_in_subset.length > 1) {
                transforms.filter(t => currentParams.active_curves.includes(t.name)).forEach(t => {
                    const primeCoords = [];
                    primes_indices_in_subset.forEach(idx_in_subset => {
                        if (idx_in_subset < u_base_subset.length) {
                            const [xt, yt, zt] = t.func(
                                u_base_subset[idx_in_subset],
                                v_base_subset[idx_in_subset],
                                w_base_subset[idx_in_subset],
                                n_array_subset[idx_in_subset],
                                idx_in_subset
                            );
                            primeCoords.push({ x: xt, y: yt, z: zt, idx: idx_in_subset });
                        }
                    });
                    
                    if (primeCoords.length > 1) {
                        primeCoords.sort((a, b) => a.idx - b.idx);
                        
                        const xLine = primeCoords.map(p => p.x);
                        const yLine = primeCoords.map(p => p.y);
                        const zLine = primeCoords.map(p => p.z);
                        
                        let lineConfig;
                        
                        if (currentParams.prime_lines_color_by_distance) {
                            const distances = [];
                            for (let i = 1; i < primeCoords.length; i++) {
                                const dx = primeCoords[i].x - primeCoords[i-1].x;
                                const dy = primeCoords[i].y - primeCoords[i-1].y;
                                const dz = primeCoords[i].z - primeCoords[i-1].z;
                                const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                                distances.push(dist);
                            }
                            
                            const minDist = Math.min(...distances);
                            const maxDist = Math.max(...distances);
                            const distRange = maxDist - minDist;
                            
                            const segmentColors = distances.map(dist => {
                                if (distRange === 0) return 'rgba(255, 0, 0, 0.8)';
                                const normalized = (dist - minDist) / distRange;
                                const r = Math.round(255 * normalized);
                                const b = Math.round(255 * (1 - normalized));
                                return `rgba(${r}, 0, ${b}, 0.8)`;
                            });
                            
                            segmentColors.push(segmentColors[segmentColors.length - 1]);
                            
                            lineConfig = { 
                                width: currentParams.prime_line_width, 
                                color: segmentColors
                            };
                        } else {
                            lineConfig = { 
                                width: currentParams.prime_line_width, 
                                color: 'rgba(255, 0, 0, 0.8)' 
                            };
                        }
                        
                        fig_data.push({
                            x: xLine,
                            y: yLine,
                            z: zLine,
                            mode: 'lines',
                            type: 'scatter3d',
                            line: lineConfig,
                            name: `${t.name} Prime Links`,
                            hoverinfo: 'skip',
                            showlegend: false
                        });
                    }
                });
            }

            const layout = {
                scene:{
                    xaxis:{visible:false,showgrid:false,zeroline:false,showticklabels:false,title:'',backgroundcolor:"rgba(0,0,0,0)"},
                    yaxis:{visible:false,showgrid:false,zeroline:false,showticklabels:false,title:'',backgroundcolor:"rgba(0,0,0,0)"},
                    zaxis:{visible:false,showgrid:false,zeroline:false,showticklabels:false,title:'',backgroundcolor:"rgba(0,0,0,0)"},
                    bgcolor:'#06090f'
                },
                paper_bgcolor:'#06090f',
                plot_bgcolor:'#06090f',
                font:{color:'#adafae'},
                margin:{l:0,r:0,b:0,t:0},
                showlegend:false,
                uirevision: 'true'
            };

            if (isFirstPlot) {
                layout.scene.camera = { up: { x: 0, y: 0, z: 1 }, center: { x: 0, y: 0, z: 0 }, eye: { x: 1.6, y: 1.6, z: 0.8 } };
                isFirstPlot = false;
            }
            
            Plotly.react('plotDiv', fig_data, layout);
        }

        // Initialize Z_n extension after DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            // Wait a bit for main setup to complete
            setTimeout(initZnExtension, 100);
        });

        // ================================================================================
        // END COMPASS NUMBERS EXTENSION
        // ================================================================================
    </script>
</body>
</html>
