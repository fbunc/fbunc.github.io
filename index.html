<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>fbunc — Prime Geometry</title>
<style>
  :root {
    --bg-0: #050608;
    --bg-1: #0e1116;
    --bg-2: #161a22;
    --fg-0: #f4f6fb;
    --fg-1: #adb3c2;
    --accent: #6dd3c4;
    --prime:  #ffb547;
    --border: #2a2f3a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg-0); color: var(--fg-0);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  body { display: flex; flex-direction: column; }

  header {
    display: flex; align-items: center; gap: 1rem;
    padding: .55rem .9rem;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    flex: 0 0 auto;
  }
  header .brand { font-weight: 600; letter-spacing: .02em; color: var(--fg-0); }
  header .brand .eq { color: var(--accent); font-family: 'Cambria Math', 'Latin Modern Math', serif; }
  header .brand .om { color: var(--prime); }
  nav { display: flex; gap: .4rem; margin-left: auto; }
  nav button {
    background: transparent;
    color: var(--fg-1);
    border: 1px solid var(--border);
    padding: .4rem .9rem;
    border-radius: .3rem;
    font: inherit;
    cursor: pointer;
    transition: color .12s, border-color .12s, background .12s;
  }
  nav button:hover { color: var(--fg-0); border-color: var(--accent); }
  nav button.active {
    color: var(--bg-0);
    background: var(--accent);
    border-color: var(--accent);
  }
  nav button.active.prime {
    background: var(--prime);
    border-color: var(--prime);
  }

  main { flex: 1 1 auto; position: relative; }
  iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: 0;
    background: var(--bg-0);
    display: none;
  }
  iframe.active { display: block; }

  footer {
    flex: 0 0 auto;
    padding: .35rem .9rem;
    font-size: .78rem;
    color: var(--fg-1);
    background: var(--bg-1);
    border-top: 1px solid var(--border);
    display: flex; gap: 1rem; flex-wrap: wrap;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="eq">s<sub>n</sub></span> =
    <span>Σ</span>
    <span class="om">ω</span><sup>b<sub>k</sub></sup>
    &nbsp;·&nbsp; fbunc
  </div>
  <nav>
    <button id="tab-curve"  class="active"       data-target="frame-curve">Curve Playground</button>
    <button id="tab-factor" class="prime"        data-target="frame-factor">Factorization in 2D</button>
  </nav>
</header>

<main>
  <iframe id="frame-curve"  class="active" src="StartHere.html"       title="Curve Playground v6"></iframe>
  <iframe id="frame-factor"                src="FactorizationIn2D.html" title="Factorization in 2D"></iframe>
</main>

<footer>
  <span>Direct links:
    <a href="StartHere.html">StartHere.html</a> ·
    <a href="FactorizationIn2D.html">FactorizationIn2D.html</a>
  </span>
  <span style="margin-left:auto;">deep-link: <code>#curve</code> · <code>#factor</code></span>
</footer>

<script>
(function () {
  const tabs = {
    curve:  { btn: document.getElementById('tab-curve'),  frame: document.getElementById('frame-curve')  },
    factor: { btn: document.getElementById('tab-factor'), frame: document.getElementById('frame-factor') },
  };

  function activate(key, pushHash) {
    if (!tabs[key]) key = 'curve';
    for (const k of Object.keys(tabs)) {
      const on = (k === key);
      tabs[k].btn.classList.toggle('active', on);
      tabs[k].frame.classList.toggle('active', on);
    }
    if (pushHash) history.replaceState(null, '', '#' + key);
  }

  for (const [key, t] of Object.entries(tabs)) {
    t.btn.addEventListener('click', () => activate(key, true));
  }
  window.addEventListener('hashchange', () => activate(location.hash.replace('#',''), false));

  activate(location.hash.replace('#','') || 'curve', false);
})();
</script>

</body>
</html>
